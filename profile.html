<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL Champions Hub - Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold:       #c89b3c;
            --gold-light: #f0e6d2;
            --gold-dim:   #8a6a1a;
            --deep-navy:  #0a1428;
            --navy:       #1a2f3f;
            --navy-mid:   #0d1f35;
            --border:     #2a4a5f;
        }

        body {
            min-height: 100vh;
            background: var(--deep-navy);
            font-family: 'Rajdhani', sans-serif;
            color: var(--gold-light);
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 70% 50% at 10% 20%, rgba(200,155,60,.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 70% at 90% 80%, rgba(26,47,63,.6) 0%, transparent 70%),
                linear-gradient(160deg, #071020 0%, #0a1428 50%, #0d1f35 100%);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background: repeating-linear-gradient(
                -45deg, transparent, transparent 80px,
                rgba(200,155,60,.012) 80px, rgba(200,155,60,.012) 81px
            );
            pointer-events: none;
        }

        /* ─── HEADER ─── */
        header {
            background: rgba(10,20,40,.97);
            border-bottom: 1px solid rgba(200,155,60,.25);
            padding: 0 40px;
            position: sticky; top: 0; z-index: 100;
        }
        .header-content {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 1100px; margin: 0 auto; padding: 14px 0;
        }
        .logo-block { display: flex; flex-direction: column; align-items: center; text-decoration: none; }
        .logo-block .t1 { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 4px; color: var(--gold); opacity: .6; }
        .logo-block .t2 { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 900; color: var(--gold-light); letter-spacing: 2px; }
        .logo-block .t3 { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 4px; color: var(--gold); opacity: .5; }
        .back-btn {
            display: flex; align-items: center; gap: 8px;
            font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px;
            color: rgba(200,155,60,.5); text-decoration: none;
            transition: color .3s;
        }
        .back-btn:hover { color: var(--gold); }

        /* ─── PAGE LAYOUT ─── */
        .page-wrap {
            position: relative; z-index: 1;
            max-width: 900px; margin: 0 auto;
            padding: 50px 20px 80px;
        }

        /* Page title */
        .page-header {
            display: flex; align-items: center; gap: 20px;
            margin-bottom: 44px;
        }
        .page-header-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--gold), transparent); }
        .page-title {
            font-family: 'Cinzel', serif;
            font-size: 22px; font-weight: 700;
            letter-spacing: 4px; color: var(--gold-light);
            text-shadow: 0 0 30px rgba(200,155,60,.3);
            white-space: nowrap;
        }
        .page-diamond { width: 8px; height: 8px; background: var(--gold); transform: rotate(45deg); flex-shrink: 0; }

        /* ─── MAIN GRID ─── */
        .profile-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 24px;
            align-items: start;
        }

        /* ─── PANEL BASE ─── */
        .panel {
            background: rgba(13,31,53,.95);
            border: 1px solid rgba(200,155,60,.2);
            padding: 28px;
            position: relative;
            clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
        }
        .panel::before, .panel::after {
            content: '';
            position: absolute;
            width: 12px; height: 12px;
            border-color: rgba(200,155,60,.4);
            border-style: solid;
        }
        .panel::before { bottom: 6px; left: 6px; border-width: 0 0 1px 1px; }
        .panel::after  { top: 6px; right: 22px; border-width: 1px 1px 0 0; }

        .panel-title {
            font-family: 'Cinzel', serif;
            font-size: 11px; letter-spacing: 3px;
            color: var(--gold); opacity: .7;
            margin-bottom: 22px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(200,155,60,.15);
        }

        /* ─── AVATAR PANEL ─── */
        .avatar-panel { text-align: center; }

        .avatar-ring {
            width: 150px; height: 150px;
            border-radius: 50%;
            margin: 0 auto 20px;
            position: relative;
            cursor: pointer;
        }
        /* Animated gold ring */
        .avatar-ring::before {
            content: '';
            position: absolute; inset: -4px;
            border-radius: 50%;
            background: conic-gradient(var(--gold) 0%, rgba(200,155,60,.1) 60%, var(--gold) 100%);
            animation: spinRing 4s linear infinite;
            z-index: 0;
        }
        @keyframes spinRing {
            to { transform: rotate(360deg); }
        }
        .avatar-ring::after {
            content: '';
            position: absolute; inset: -3px;
            border-radius: 50%;
            background: var(--deep-navy);
            z-index: 1;
        }
        .avatar-img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            position: relative; z-index: 2;
            display: block;
        }
        .avatar-overlay {
            position: absolute; inset: 0;
            border-radius: 50%;
            background: rgba(10,20,40,.7);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity .3s;
            z-index: 3;
            cursor: pointer;
            gap: 4px;
        }
        .avatar-ring:hover .avatar-overlay { opacity: 1; }
        .avatar-overlay span { font-size: 22px; }
        .avatar-overlay small {
            font-family: 'Cinzel', serif;
            font-size: 9px; letter-spacing: 2px; color: var(--gold);
        }

        #avatarFileInput { display: none; }

        /* Avatar grid picker */
        .avatar-picker-title {
            font-family: 'Cinzel', serif;
            font-size: 10px; letter-spacing: 2px;
            color: rgba(200,155,60,.5);
            margin-bottom: 12px;
        }
        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }
        .av-opt {
            width: 100%; aspect-ratio: 1;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            object-fit: cover;
            transition: all .25s;
            background: var(--navy);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            overflow: hidden;
        }
        .av-opt:hover { border-color: rgba(200,155,60,.5); transform: scale(1.08); }
        .av-opt.selected { border-color: var(--gold); box-shadow: 0 0 12px rgba(200,155,60,.4); }
        .av-opt img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .upload-btn {
            width: 100%;
            background: rgba(200,155,60,.08);
            border: 1px dashed rgba(200,155,60,.3);
            color: rgba(200,155,60,.6);
            font-family: 'Cinzel', serif;
            font-size: 10px; letter-spacing: 1px;
            padding: 10px;
            cursor: pointer;
            transition: all .3s;
            clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
        }
        .upload-btn:hover {
            background: rgba(200,155,60,.15);
            border-color: var(--gold);
            color: var(--gold);
        }

        /* ─── RANK SECTION ─── */
        .rank-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 6px;
        }
        .rank-opt {
            display: flex; flex-direction: column;
            align-items: center; gap: 5px;
            padding: 10px 6px;
            border: 1px solid rgba(200,155,60,.15);
            cursor: pointer;
            transition: all .25s;
            position: relative;
            background: rgba(255,255,255,.02);
        }
        .rank-opt:hover { border-color: rgba(200,155,60,.4); background: rgba(200,155,60,.06); }
        .rank-opt.selected {
            border-color: var(--gold);
            background: rgba(200,155,60,.12);
            box-shadow: 0 0 12px rgba(200,155,60,.15);
        }
        .rank-opt.selected::after {
            content: '✓';
            position: absolute; top: 3px; right: 5px;
            font-size: 9px; color: var(--gold);
        }
        .rank-icon { font-size: 22px; line-height: 1; }
        .rank-name {
            font-family: 'Cinzel', serif;
            font-size: 8px; letter-spacing: 1px;
            color: rgba(240,230,210,.5);
            text-align: center;
        }
        .rank-opt.selected .rank-name { color: var(--gold); }

        /* ─── LANE SECTION ─── */
        .lane-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        .lane-opt {
            display: flex; flex-direction: column;
            align-items: center; gap: 5px;
            padding: 12px 6px;
            border: 1px solid rgba(200,155,60,.15);
            cursor: pointer;
            transition: all .25s;
            background: rgba(255,255,255,.02);
        }
        .lane-opt:hover { border-color: rgba(200,155,60,.4); background: rgba(200,155,60,.06); }
        .lane-opt.selected {
            border-color: var(--gold);
            background: rgba(200,155,60,.12);
        }
        .lane-icon { font-size: 20px; }
        .lane-name {
            font-family: 'Cinzel', serif;
            font-size: 8px; letter-spacing: 1px;
            color: rgba(240,230,210,.5);
        }
        .lane-opt.selected .lane-name { color: var(--gold); }

        /* ─── FORM FIELDS ─── */
        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-family: 'Cinzel', serif;
            font-size: 10px; letter-spacing: 2px;
            color: rgba(200,155,60,.6);
            margin-bottom: 7px;
        }
        .field input, .field select {
            width: 100%;
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(200,155,60,.2);
            color: var(--gold-light);
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px; font-weight: 500;
            padding: 11px 14px;
            outline: none;
            transition: border-color .3s, background .3s, box-shadow .3s;
            clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
            -webkit-appearance: none;
        }
        .field select option { background: #0d1f35; }
        .field input:focus, .field select:focus {
            border-color: var(--gold);
            background: rgba(200,155,60,.06);
            box-shadow: 0 0 0 3px rgba(200,155,60,.07);
        }
        .field input::placeholder { color: rgba(240,230,210,.2); font-size: 13px; }

        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

        /* Gender buttons */
        .gender-row { display: flex; gap: 10px; }
        .gender-btn {
            flex: 1; padding: 10px;
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(200,155,60,.15);
            color: rgba(240,230,210,.5);
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px; font-weight: 600;
            cursor: pointer;
            transition: all .25s;
            clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
        }
        .gender-btn:hover { border-color: rgba(200,155,60,.4); background: rgba(200,155,60,.06); }
        .gender-btn.selected {
            border-color: var(--gold);
            background: rgba(200,155,60,.12);
            color: var(--gold-light);
        }

        /* ─── SAVE BUTTON ─── */
        .save-btn {
            width: 100%; margin-top: 10px;
            background: linear-gradient(135deg, #8a6a1a 0%, #c89b3c 50%, #8a6a1a 100%);
            background-size: 200% 100%;
            border: none;
            color: var(--deep-navy);
            font-family: 'Cinzel', serif;
            font-size: 13px; font-weight: 700;
            letter-spacing: 3px;
            padding: 15px;
            cursor: pointer;
            position: relative; overflow: hidden;
            transition: background-position .5s, transform .2s, box-shadow .3s;
            clip-path: polygon(10px 0, 100% 0, calc(100% - 10px) 100%, 0 100%);
        }
        .save-btn:hover {
            background-position: right center;
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(200,155,60,.35);
        }
        .save-btn::before {
            content: '';
            position: absolute; top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
            transform: skewX(-20deg);
            transition: left .6s;
        }
        .save-btn:hover::before { left: 150%; }

        /* Danger zone */
        .danger-zone {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(221,85,85,.15);
        }
        .danger-title {
            font-family: 'Cinzel', serif;
            font-size: 10px; letter-spacing: 2px;
            color: rgba(221,85,85,.5);
            margin-bottom: 12px;
        }
        .logout-btn {
            width: 100%;
            background: rgba(221,85,85,.06);
            border: 1px solid rgba(221,85,85,.25);
            color: rgba(221,85,85,.6);
            font-family: 'Cinzel', serif;
            font-size: 11px; letter-spacing: 2px;
            padding: 11px;
            cursor: pointer;
            transition: all .3s;
            clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
        }
        .logout-btn:hover {
            background: rgba(221,85,85,.12);
            border-color: rgba(221,85,85,.5);
            color: #e55;
        }

        /* ─── TOAST ─── */
        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(13,31,53,.98);
            border: 1px solid var(--gold);
            color: var(--gold-light);
            font-family: 'Cinzel', serif;
            font-size: 12px; letter-spacing: 1px;
            padding: 14px 30px;
            opacity: 0;
            transition: all .4s; z-index: 999;
            pointer-events: none;
            box-shadow: 0 8px 30px rgba(0,0,0,.5);
            white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Section separator */
        .section-sep { margin: 22px 0; height: 1px; background: rgba(200,155,60,.12); }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 700px) {
            .profile-grid { grid-template-columns: 1fr; }
            .rank-grid { grid-template-columns: repeat(4, 1fr); }
            header { padding: 0 16px; }
            .page-wrap { padding: 30px 14px 60px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <a href="index.html" class="logo-block">
            <div class="t1">LOL</div>
            <div class="t2">CHAMPIONS</div>
            <div class="t3">HUB</div>
        </a>
        <a href="index.html" class="back-btn">&larr; Back to Home</a>
    </div>
</header>

<div class="page-wrap">
    <!-- Page title -->
    <div class="page-header">
        <div class="page-diamond"></div>
        <div class="page-title">PROFILE SETTINGS</div>
        <div class="page-header-line"></div>
    </div>

    <div class="profile-grid">

        <!-- ── LEFT: AVATAR + RANK + LANE ── -->
        <div style="display:flex;flex-direction:column;gap:20px;">

            <!-- Avatar Panel -->
            <div class="panel avatar-panel">
                <div class="panel-title">SUMMONER AVATAR</div>

                <div class="avatar-ring" onclick="document.getElementById('avatarFileInput').click()">
                    <img class="avatar-img" id="mainAvatar" src="" alt="Avatar">
                    <div class="avatar-overlay">
                        <span>📷</span>
                        <small>DEĞİŞTİR</small>
                    </div>
                </div>
                <input type="file" id="avatarFileInput" accept="image/*" onchange="handleAvatarUpload(this)">

                <div class="avatar-picker-title">PRESET AVATARS</div>
                <div class="avatar-grid" id="avatarGrid">
                    <!-- filled by JS -->
                </div>

                <button class="upload-btn" onclick="document.getElementById('avatarFileInput').click()">
                    📁 KENDİ FOTOĞRAFINI YÜKLE
                </button>
            </div>

            <!-- Rank Panel -->
            <div class="panel">
                <div class="panel-title">RANK</div>
                <div class="rank-grid" id="rankGrid">
                    <!-- filled by JS -->
                </div>
            </div>

            <!-- Lane Panel -->
            <div class="panel">
                <div class="panel-title">PREFERRED LANE</div>
                <div class="lane-grid" id="laneGrid">
                    <!-- filled by JS -->
                </div>
            </div>
        </div>

        <!-- ── RIGHT: INFO FORM ── -->
        <div class="panel">
            <div class="panel-title">PERSONAL INFORMATION</div>

            <div class="field">
                <label>SUMMONER NAME</label>
                <input type="text" id="pUsername" placeholder="LegendaryVayne" maxlength="20">
            </div>

            <div class="field-row">
                <div class="field">
                    <label>FIRST NAME</label>
                    <input type="text" id="pFirstName" placeholder="Yasuo">
                </div>
                <div class="field">
                    <label>LAST NAME</label>
                    <input type="text" id="pLastName" placeholder="Rüzgar">
                </div>
            </div>

            <div class="field-row">
                <div class="field">
                    <label>AGE</label>
                    <input type="number" id="pAge" placeholder="18" min="10" max="99">
                </div>
                <div class="field">
                    <label>COUNTRY</label>
                    <input type="text" id="pCountry" placeholder="Turkey">
                </div>
            </div>

            <div class="field">
                <label>GENDER</label>
                <div class="gender-row">
                    <button class="gender-btn" data-val="Male" onclick="selectGender(this)">Male</button>
                    <button class="gender-btn" data-val="Female" onclick="selectGender(this)">Female</button>
                    <button class="gender-btn" data-val="Prefer not to say" onclick="selectGender(this)">Other</button>
                </div>
            </div>

            <div class="section-sep"></div>

            <div class="field">
                <label>EMAIL</label>
                <input type="email" id="pEmail" placeholder="summoner@lol.com">
            </div>

            <div class="field">
                <label>BIO</label>
                <input type="text" id="pBio" placeholder="I main Zed and love outplays..." maxlength="80">
            </div>

            <div class="field">
                <label>FAVORITE CHAMPION</label>
                <input type="text" id="pChampion" placeholder="Zed, Yasuo, Jinx...">
            </div>

            <button class="save-btn" onclick="saveProfile()">
                Save Profile
            </button>

            <div class="danger-zone">
                <div class="danger-title">DANGER ZONE</div>
                <button class="logout-btn" onclick="logout()">
                    SIGN OUT
                </button>
            </div>
        </div>

    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    /* ── Data ── */
    const RANKS = [
        { icon: '🪵', name: 'Iron' },
        { icon: '🥉', name: 'Bronze' },
        { icon: '🥈', name: 'Silver' },
        { icon: '🥇', name: 'Gold' },
        { icon: '💠', name: 'Platinum' },
        { icon: '💎', name: 'Emerald' },
        { icon: '💙', name: 'Diamond' },
        { icon: '🔮', name: 'Master' },
        { icon: '🌟', name: 'Grand M.' },
        { icon: '👑', name: 'Chall.' },
        { icon: '❓', name: 'Unranked' },
    ];

    const LANES = [
        { icon: '🗡', name: 'Top' },
        { icon: '🌲', name: 'Jungle' },
        { icon: '⚡', name: 'Mid' },
        { icon: '🏹', name: 'ADC' },
        { icon: '🛡', name: 'Support' },
    ];

    const AVATARS = [
        { emoji: '🦊', label: 'Ahri' },
        { emoji: '⚔️', label: 'Yasuo' },
        { emoji: '💥', label: 'Jinx' },
        { emoji: '🌸', label: 'Lux' },
        { emoji: '🐉', label: 'Shyvana' },
        { emoji: '🌑', label: 'Zed' },
        { emoji: '🌀', label: 'Akali' },
        { emoji: '🔥', label: 'Brand' },
    ];

    let selectedRank = '';
    let selectedLane = '';
    let selectedGender = '';
    let currentAvatarSrc = ''; // base64 or emoji key

    /* ── Build avatar grid ── */
    function buildAvatarGrid() {
        const grid = document.getElementById('avatarGrid');
        AVATARS.forEach((av, i) => {
            const el = document.createElement('div');
            el.className = 'av-opt';
            el.dataset.idx = i;
            el.title = av.label;
            el.textContent = av.emoji;
            el.onclick = () => selectPresetAvatar(i, el);
            grid.appendChild(el);
        });
    }

    function selectPresetAvatar(idx, el) {
        document.querySelectorAll('.av-opt').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        const emoji = AVATARS[idx].emoji;
        // Draw emoji on canvas → data URL
        const canvas = document.createElement('canvas');
        canvas.width = canvas.height = 160;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#1a2f3f';
        ctx.fillRect(0,0,160,160);
        ctx.font = '90px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(emoji, 80, 85);
        currentAvatarSrc = canvas.toDataURL();
        document.getElementById('mainAvatar').src = currentAvatarSrc;
    }

    /* ── Handle file upload ── */
    function handleAvatarUpload(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            currentAvatarSrc = e.target.result;
            document.getElementById('mainAvatar').src = currentAvatarSrc;
            document.querySelectorAll('.av-opt').forEach(el => el.classList.remove('selected'));
        };
        reader.readAsDataURL(file);
    }

    /* ── Build rank grid ── */
    function buildRankGrid() {
        const grid = document.getElementById('rankGrid');
        RANKS.forEach(r => {
            const el = document.createElement('div');
            el.className = 'rank-opt';
            el.dataset.rank = r.name;
            el.innerHTML = `<div class="rank-icon">${r.icon}</div><div class="rank-name">${r.name}</div>`;
            el.onclick = () => {
                document.querySelectorAll('.rank-opt').forEach(e => e.classList.remove('selected'));
                el.classList.add('selected');
                selectedRank = r.name;
            };
            grid.appendChild(el);
        });
    }

    /* ── Build lane grid ── */
    function buildLaneGrid() {
        const grid = document.getElementById('laneGrid');
        LANES.forEach(l => {
            const el = document.createElement('div');
            el.className = 'lane-opt';
            el.dataset.lane = l.name;
            el.innerHTML = `<div class="lane-icon">${l.icon}</div><div class="lane-name">${l.name}</div>`;
            el.onclick = () => {
                document.querySelectorAll('.lane-opt').forEach(e => e.classList.remove('selected'));
                el.classList.add('selected');
                selectedLane = l.name;
            };
            grid.appendChild(el);
        });
    }

    /* ── Gender ── */
    function selectGender(btn) {
        document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedGender = btn.dataset.val;
    }

    /* ── Toast ── */
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    /* ── Load profile ── */
    function loadProfile() {
        const user = JSON.parse(localStorage.getItem('lol_current') || 'null');
        if (!user) { window.location.href = 'auth.html'; return; }

        const profile = JSON.parse(localStorage.getItem('lol_profile_' + user.email) || '{}');

        // Avatar
        const avatarSrc = profile.avatar || '';
        if (avatarSrc) {
            currentAvatarSrc = avatarSrc;
            document.getElementById('mainAvatar').src = avatarSrc;
        } else {
            // Default emoji avatar
            selectPresetAvatar(0, document.querySelector('.av-opt'));
        }

        // Fields
        document.getElementById('pUsername').value  = profile.username  || user.username || '';
        document.getElementById('pFirstName').value = profile.firstName || '';
        document.getElementById('pLastName').value  = profile.lastName  || '';
        document.getElementById('pAge').value       = profile.age       || '';
        document.getElementById('pCountry').value   = profile.country   || '';
        document.getElementById('pEmail').value     = profile.email     || user.email || '';
        document.getElementById('pBio').value       = profile.bio       || '';
        document.getElementById('pChampion').value  = profile.champion  || '';

        // Rank
        if (profile.rank) {
            selectedRank = profile.rank;
            document.querySelectorAll('.rank-opt').forEach(el => {
                if (el.dataset.rank === profile.rank) el.classList.add('selected');
            });
        }

        // Lane
        if (profile.lane) {
            selectedLane = profile.lane;
            document.querySelectorAll('.lane-opt').forEach(el => {
                if (el.dataset.lane === profile.lane) el.classList.add('selected');
            });
        }

        // Gender
        if (profile.gender) {
            selectedGender = profile.gender;
            document.querySelectorAll('.gender-btn').forEach(b => {
                if (b.dataset.val === profile.gender) b.classList.add('selected');
            });
        }
    }

    /* ── Save profile ── */
    function saveProfile() {
        const user = JSON.parse(localStorage.getItem('lol_current') || 'null');
        if (!user) return;

        const profile = {
            avatar:    currentAvatarSrc,
            username:  document.getElementById('pUsername').value.trim(),
            firstName: document.getElementById('pFirstName').value.trim(),
            lastName:  document.getElementById('pLastName').value.trim(),
            age:       document.getElementById('pAge').value.trim(),
            country:   document.getElementById('pCountry').value.trim(),
            email:     document.getElementById('pEmail').value.trim(),
            bio:       document.getElementById('pBio').value.trim(),
            champion:  document.getElementById('pChampion').value.trim(),
            rank:      selectedRank,
            lane:      selectedLane,
            gender:    selectedGender,
        };

        localStorage.setItem('lol_profile_' + user.email, JSON.stringify(profile));

        // Update current user display name if changed
        if (profile.username) {
            const updated = { ...user, username: profile.username };
            localStorage.setItem('lol_current', JSON.stringify(updated));
        }

        showToast('Profile saved successfully.');
    }

    /* ── Logout ── */
    function logout() {
        localStorage.removeItem('lol_current');
        window.location.href = 'index.html';
    }

    /* ── Init ── */
    buildAvatarGrid();
    buildRankGrid();
    buildLaneGrid();
    loadProfile();
</script>
</body>
</html>
