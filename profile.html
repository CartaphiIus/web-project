<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL Champions Hub - Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="profile.css">
</head>
<body>

<header>
    <div class="header-content">
        <a href="index.html" class="logo-block">
            <div class="t1">LOL</div>
            <div class="t2">CHAMPIONS</div>
            <div class="t3">HUB</div>
        </a>
        <a href="index.html" class="back-btn">&larr; Back to Home</a>
    </div>
</header>

<div class="page-wrap">
    <!-- Page title -->
    <div class="page-header">
        <div class="page-diamond"></div>
        <div class="page-title">PROFILE SETTINGS</div>
        <div class="page-header-line"></div>
    </div>

    <div class="profile-grid">

        <!-- ── LEFT: AVATAR + RANK + LANE ── -->
        <div style="display:flex;flex-direction:column;gap:20px;">

            <!-- Avatar Panel -->
            <div class="panel avatar-panel">
                <div class="panel-title">SUMMONER AVATAR</div>

                <label class="avatar-ring" for="avatarFileInput" aria-label="Upload avatar image">
                    <img class="avatar-img" id="mainAvatar" src="" alt="Avatar">
                    <div class="avatar-overlay">
                        <span>📷</span>
                        <small>DEĞİŞTİR</small>
                    </div>
                </label>
                <input type="file" id="avatarFileInput" accept="image/*" onchange="handleAvatarUpload(this)">

                <div class="avatar-picker-title">PRESET AVATARS</div>
                <div class="avatar-grid" id="avatarGrid">
                    <!-- filled by JS -->
                </div>

                <button class="upload-btn" onclick="document.getElementById('avatarFileInput').click()">
                    📁 KENDİ FOTOĞRAFINI YÜKLE
                </button>
            </div>

            <!-- Rank Panel -->
            <div class="panel">
                <div class="panel-title">RANK</div>
                <div class="rank-grid" id="rankGrid">
                    <!-- filled by JS -->
                </div>
            </div>

            <!-- Lane Panel -->
            <div class="panel">
                <div class="panel-title">PREFERRED LANE</div>
                <div class="lane-grid" id="laneGrid">
                    <!-- filled by JS -->
                </div>
            </div>
        </div>

        <!-- ── RIGHT: INFO FORM ── -->
        <div class="panel">
            <div class="panel-title">PERSONAL INFORMATION</div>

            <div class="field">
                <label>SUMMONER NAME</label>
                <input type="text" id="pUsername" placeholder="LegendaryVayne" maxlength="20">
            </div>

            <div class="field-row">
                <div class="field">
                    <label>FIRST NAME</label>
                    <input type="text" id="pFirstName" placeholder="Yasuo">
                </div>
                <div class="field">
                    <label>LAST NAME</label>
                    <input type="text" id="pLastName" placeholder="Rüzgar">
                </div>
            </div>

            <div class="field-row">
                <div class="field">
                    <label>AGE</label>
                    <input type="number" id="pAge" placeholder="18" min="10" max="99">
                </div>
                <div class="field">
                    <label>COUNTRY</label>
                    <input type="text" id="pCountry" placeholder="Turkey">
                </div>
            </div>

            <div class="field">
                <label>GENDER</label>
                <div class="gender-row">
                    <button class="gender-btn" data-val="Male" onclick="selectGender(this)">Male</button>
                    <button class="gender-btn" data-val="Female" onclick="selectGender(this)">Female</button>
                    <button class="gender-btn" data-val="Prefer not to say" onclick="selectGender(this)">Other</button>
                </div>
            </div>

            <div class="section-sep"></div>

            <div class="field">
                <label>EMAIL</label>
                <input type="email" id="pEmail" placeholder="summoner@lol.com">
            </div>

            <div class="field">
                <label>BIO</label>
                <input type="text" id="pBio" placeholder="I main Zed and love outplays..." maxlength="80">
            </div>

            <div class="field">
                <label>FAVORITE CHAMPION</label>
                <input type="text" id="pChampion" placeholder="Zed, Yasuo, Jinx...">
            </div>

            <div class="field">
                <label>FAVORITE TEAM COMPOSITION</label>
                <div class="comp-builder">
                    <div class="comp-slot-row" id="favCompSlots"></div>
                    <div class="comp-picker-head">
                        <div class="comp-active-lane" id="favCompActiveLane">Choose a lane slot to start building your comp.</div>
                        <button type="button" class="comp-clear-btn" id="clearCompSlotBtn">CLEAR SLOT</button>
                    </div>
                    <div class="comp-picker-grid" id="favCompGrid"></div>
                </div>
                <small class="field-note">Her slot sadece kendi lane'ine uygun şampiyonları gösterir. Slotu seçip görsele tıklaman yeterli.</small>
            </div>

            <button class="save-btn" onclick="saveProfile()">
                Save Profile
            </button>

            <div class="danger-zone">
                <div class="danger-title">DANGER ZONE</div>
                <button class="logout-btn" onclick="logout()">
                    SIGN OUT
                </button>
            </div>
        </div>

    </div>
</div>

<div class="toast" id="toast"></div>

<script src="champion-lanes.js"></script>
<script src="champion-full-tr.js"></script>
<script>
    /* ── Data ── */
    const RANKS = [
        { icon: '🪵', name: 'Iron' },
        { icon: '🥉', name: 'Bronze' },
        { icon: '🥈', name: 'Silver' },
        { icon: '🥇', name: 'Gold' },
        { icon: '💠', name: 'Platinum' },
        { icon: '💎', name: 'Emerald' },
        { icon: '💙', name: 'Diamond' },
        { icon: '🔮', name: 'Master' },
        { icon: '🌟', name: 'Grand M.' },
        { icon: '👑', name: 'Chall.' },
        { icon: '❓', name: 'Unranked' },
    ];

    const LANES = [
        { icon: '🗡', name: 'Top' },
        { icon: '🌲', name: 'Jungle' },
        { icon: '⚡', name: 'Mid' },
        { icon: '🏹', name: 'ADC' },
        { icon: '🛡', name: 'Support' },
    ];

    const AVATARS = [
        { emoji: '🦊', label: 'Ahri' },
        { emoji: '⚔️', label: 'Yasuo' },
        { emoji: '💥', label: 'Jinx' },
        { emoji: '🌸', label: 'Lux' },
        { emoji: '🐉', label: 'Shyvana' },
        { emoji: '🌑', label: 'Zed' },
        { emoji: '🌀', label: 'Akali' },
        { emoji: '🔥', label: 'Brand' },
    ];

    let selectedRank = '';
    let selectedLane = '';
    let selectedGender = '';
    let currentAvatarSrc = ''; // base64 or emoji key
    const TEAM_COMP_LANES = [
        { key: 'Top', label: 'TOP' },
        { key: 'Jungle', label: 'JUNGLE' },
        { key: 'Middle', label: 'MID' },
        { key: 'Bottom', label: 'ADC' },
        { key: 'Support', label: 'SUPPORT' },
    ];
    let favoriteTeamComp = { Top: '', Jungle: '', Middle: '', Bottom: '', Support: '' };
    let activeCompLane = 'Top';
    let championPool = [];

    /* ── Build avatar grid ── */
    function buildAvatarGrid() {
        const grid = document.getElementById('avatarGrid');
        AVATARS.forEach((av, i) => {
            const el = document.createElement('div');
            el.className = 'av-opt';
            el.dataset.idx = i;
            el.title = av.label;
            el.textContent = av.emoji;
            el.onclick = () => selectPresetAvatar(i, el);
            grid.appendChild(el);
        });
    }

    function selectPresetAvatar(idx, el) {
        document.querySelectorAll('.av-opt').forEach(e => e.classList.remove('selected'));
        el.classList.add('selected');
        const emoji = AVATARS[idx].emoji;
        // Draw emoji on canvas → data URL
        const canvas = document.createElement('canvas');
        canvas.width = canvas.height = 160;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#1a2f3f';
        ctx.fillRect(0,0,160,160);
        ctx.font = '90px serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(emoji, 80, 85);
        currentAvatarSrc = canvas.toDataURL();
        document.getElementById('mainAvatar').src = currentAvatarSrc;
    }

    /* ── Handle file upload ── */
    function handleAvatarUpload(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            currentAvatarSrc = e.target.result;
            document.getElementById('mainAvatar').src = currentAvatarSrc;
            document.querySelectorAll('.av-opt').forEach(el => el.classList.remove('selected'));
        };
        reader.readAsDataURL(file);
    }

    /* ── Build rank grid ── */
    function buildRankGrid() {
        const grid = document.getElementById('rankGrid');
        RANKS.forEach(r => {
            const el = document.createElement('div');
            el.className = 'rank-opt';
            el.dataset.rank = r.name;
            el.innerHTML = `<div class="rank-icon">${r.icon}</div><div class="rank-name">${r.name}</div>`;
            el.onclick = () => {
                document.querySelectorAll('.rank-opt').forEach(e => e.classList.remove('selected'));
                el.classList.add('selected');
                selectedRank = r.name;
            };
            grid.appendChild(el);
        });
    }

    /* ── Build lane grid ── */
    function buildLaneGrid() {
        const grid = document.getElementById('laneGrid');
        LANES.forEach(l => {
            const el = document.createElement('div');
            el.className = 'lane-opt';
            el.dataset.lane = l.name;
            el.innerHTML = `<div class="lane-icon">${l.icon}</div><div class="lane-name">${l.name}</div>`;
            el.onclick = () => {
                document.querySelectorAll('.lane-opt').forEach(e => e.classList.remove('selected'));
                el.classList.add('selected');
                selectedLane = l.name;
            };
            grid.appendChild(el);
        });
    }

    /* ── Gender ── */
    function selectGender(btn) {
        document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedGender = btn.dataset.val;
    }

    /* ── Toast ── */
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    function normalizeChampionName(name) {
        return String(name || '')
            .toLowerCase()
            .replace(/[^a-z0-9]/g, '');
    }

    function buildChampionPool() {
        const rawData = window.__LOL_CHAMPION_FULL__?.data || {};
        championPool = Object.values(rawData).map(champion => ({
            id: champion.id,
            name: champion.name,
            lane: typeof window.__resolveChampionLane === 'function'
                ? window.__resolveChampionLane(champion.id, champion)
                : 'Middle',
            image: `https://ddragon.leagueoflegends.com/cdn/${window.__LOL_CHAMPION_FULL__.version}/img/champion/${champion.image.full}`,
        })).sort((a, b) => a.name.localeCompare(b.name));
    }

    function getFavoriteCompChampion(laneKey) {
        return championPool.find(champion => champion.id === favoriteTeamComp[laneKey]) || null;
    }

    function renderFavoriteCompSlots() {
        const wrap = document.getElementById('favCompSlots');
        if (!wrap) return;

        wrap.innerHTML = '';
        TEAM_COMP_LANES.forEach(({ key, label }) => {
            const selectedChampion = getFavoriteCompChampion(key);
            const slot = document.createElement('button');
            slot.type = 'button';
            slot.className = `comp-slot${activeCompLane === key ? ' active' : ''}`;
            slot.innerHTML = selectedChampion
                ? `
                    <img src="${selectedChampion.image}" alt="${selectedChampion.name}">
                    <div class="comp-slot-name">${selectedChampion.name}</div>
                    <div class="comp-slot-lane">${label}</div>
                  `
                : `
                    <div class="comp-slot-empty">+</div>
                    <div class="comp-slot-name">Empty</div>
                    <div class="comp-slot-lane">${label}</div>
                  `;
            slot.addEventListener('click', () => {
                activeCompLane = key;
                renderFavoriteCompSlots();
                renderFavoriteCompGrid();
            });
            wrap.appendChild(slot);
        });
    }

    function renderFavoriteCompGrid() {
        const label = TEAM_COMP_LANES.find(item => item.key === activeCompLane)?.label || activeCompLane;
        const title = document.getElementById('favCompActiveLane');
        const grid = document.getElementById('favCompGrid');
        if (!title || !grid) return;

        title.textContent = `${label} champions`;
        const champions = championPool.filter(champion => champion.lane === activeCompLane);

        if (!champions.length) {
            grid.innerHTML = '<div class="comp-empty-grid">No champions found for this lane.</div>';
            return;
        }

        grid.innerHTML = '';
        champions.forEach(champion => {
            const card = document.createElement('button');
            card.type = 'button';
            card.className = `comp-card${favoriteTeamComp[activeCompLane] === champion.id ? ' selected' : ''}`;
            card.innerHTML = `
                <img src="${champion.image}" alt="${champion.name}" loading="lazy">
                <div class="comp-card-name">${champion.name}</div>
            `;
            card.addEventListener('click', () => {
                favoriteTeamComp[activeCompLane] = champion.id;
                renderFavoriteCompSlots();
                renderFavoriteCompGrid();
            });
            grid.appendChild(card);
        });
    }

    function setupFavoriteCompBuilder() {
        buildChampionPool();

        const clearBtn = document.getElementById('clearCompSlotBtn');
        if (clearBtn) {
            clearBtn.addEventListener('click', () => {
                favoriteTeamComp[activeCompLane] = '';
                renderFavoriteCompSlots();
                renderFavoriteCompGrid();
            });
        }

        renderFavoriteCompSlots();
        renderFavoriteCompGrid();
    }

    /* ── Load profile ── */
    function loadProfile() {
        const user = JSON.parse(localStorage.getItem('lol_current') || 'null');
        if (!user) { window.location.href = 'auth.html'; return; }

        const profile = JSON.parse(localStorage.getItem('lol_profile_' + user.email) || '{}');

        // Avatar
        const avatarSrc = profile.avatar || '';
        if (avatarSrc) {
            currentAvatarSrc = avatarSrc;
            document.getElementById('mainAvatar').src = avatarSrc;
        } else {
            // Default emoji avatar
            selectPresetAvatar(0, document.querySelector('.av-opt'));
        }

        // Fields
        document.getElementById('pUsername').value  = profile.username  || user.username || '';
        document.getElementById('pFirstName').value = profile.firstName || '';
        document.getElementById('pLastName').value  = profile.lastName  || '';
        document.getElementById('pAge').value       = profile.age       || '';
        document.getElementById('pCountry').value   = profile.country   || '';
        document.getElementById('pEmail').value     = profile.email     || user.email || '';
        document.getElementById('pBio').value       = profile.bio       || '';
        document.getElementById('pChampion').value  = profile.champion  || '';

        if (profile.teamComp && typeof profile.teamComp === 'object') {
            favoriteTeamComp = {
                Top: profile.teamComp.Top || '',
                Jungle: profile.teamComp.Jungle || '',
                Middle: profile.teamComp.Middle || '',
                Bottom: profile.teamComp.Bottom || '',
                Support: profile.teamComp.Support || '',
            };
        }
        renderFavoriteCompSlots();
        renderFavoriteCompGrid();

        // Rank
        if (profile.rank) {
            selectedRank = profile.rank;
            document.querySelectorAll('.rank-opt').forEach(el => {
                if (el.dataset.rank === profile.rank) el.classList.add('selected');
            });
        }

        // Lane
        if (profile.lane) {
            selectedLane = profile.lane;
            document.querySelectorAll('.lane-opt').forEach(el => {
                if (el.dataset.lane === profile.lane) el.classList.add('selected');
            });
        }

        // Gender
        if (profile.gender) {
            selectedGender = profile.gender;
            document.querySelectorAll('.gender-btn').forEach(b => {
                if (b.dataset.val === profile.gender) b.classList.add('selected');
            });
        }
    }

    /* ── Save profile ── */
    function saveProfile() {
        const user = JSON.parse(localStorage.getItem('lol_current') || 'null');
        if (!user) return;

        const profile = {
            avatar:    currentAvatarSrc,
            username:  document.getElementById('pUsername').value.trim(),
            firstName: document.getElementById('pFirstName').value.trim(),
            lastName:  document.getElementById('pLastName').value.trim(),
            age:       document.getElementById('pAge').value.trim(),
            country:   document.getElementById('pCountry').value.trim(),
            email:     document.getElementById('pEmail').value.trim(),
            bio:       document.getElementById('pBio').value.trim(),
            champion:  document.getElementById('pChampion').value.trim(),
            teamComp:  favoriteTeamComp,
            rank:      selectedRank,
            lane:      selectedLane,
            gender:    selectedGender,
        };

        localStorage.setItem('lol_profile_' + user.email, JSON.stringify(profile));

        // Update current user display name if changed
        if (profile.username) {
            const updated = { ...user, username: profile.username };
            localStorage.setItem('lol_current', JSON.stringify(updated));
        }

        showToast('Profile saved successfully.');
    }

    /* ── Logout ── */
    function logout() {
        localStorage.removeItem('lol_current');
        window.location.href = 'index.html';
    }

    /* ── Init ── */
    buildAvatarGrid();
    buildRankGrid();
    buildLaneGrid();
    setupFavoriteCompBuilder();
    loadProfile();
</script>
</body>
</html>
